<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TODO LIST</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body>
    <div id="app">
      <h1>TODO LIST</h1>

      <form id="item-form">
        <input id="item-name" type="text" placeholder="Task" required />

        <input id="item-date" type="date" required />

        <button type="submit">Add Item</button>
      </form>

      <div id="stats">
        <span><strong id="total-count">0</strong> total</span>
        <span>•</span>
        <span><strong id="completed-count">0</strong> completed</span>
        <span>•</span>
        <span><strong id="percentage-count">0</strong>%</span>
      </div>

      <ul id="item-list"></ul>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
